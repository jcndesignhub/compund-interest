<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compound Interest Calculator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #ffffff;
    color: #1a1a1a;
    padding: 24px;
    font-size: 15px;
    line-height: 1.5;
  }

  .ctrl {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  .ctrl label {
    font-size: 13px;
    color: #666;
    min-width: 140px;
  }
  .ctrl input[type=range] {
    flex: 1;
    height: 4px;
    accent-color: #3266ad;
    cursor: pointer;
  }
  .ctrl .val {
    font-size: 14px;
    font-weight: 500;
    min-width: 64px;
    text-align: right;
    color: #1a1a1a;
  }

  .metrics {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin: 20px 0;
  }
  .metric {
    background: #f5f5f3;
    border-radius: 8px;
    padding: 12px 14px;
  }
  .metric .lbl {
    font-size: 12px;
    color: #888;
    margin-bottom: 4px;
  }
  .metric .num {
    font-size: 20px;
    font-weight: 500;
    color: #1a1a1a;
  }
  .metric .num.green {
    color: #1D9E75;
  }

  .legend {
    display: flex;
    gap: 20px;
    font-size: 12px;
    color: #888;
    margin-bottom: 8px;
  }
  .legend span {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .legend i {
    width: 28px;
    height: 3px;
    border-radius: 2px;
    display: inline-block;
  }
</style>
</head>
<body>

  <div class="ctrl">
    <label>Initial investment</label>
    <input type="range" id="principal" min="1000" max="50000" step="1000" value="10000">
    <span class="val" id="pVal">$10,000</span>
  </div>
  <div class="ctrl">
    <label>Annual return</label>
    <input type="range" id="rate" min="1" max="20" step="0.5" value="7">
    <span class="val" id="rVal">7%</span>
  </div>
  <div class="ctrl">
    <label>Monthly contribution</label>
    <input type="range" id="monthly" min="0" max="2000" step="50" value="200">
    <span class="val" id="mVal">$200</span>
  </div>
  <div class="ctrl">
    <label>Time horizon</label>
    <input type="range" id="years" min="1" max="40" step="1" value="20">
    <span class="val" id="yVal">20 yrs</span>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="lbl">Total invested</div>
      <div class="num" id="mInvested">$58,000</div>
    </div>
    <div class="metric">
      <div class="lbl">Interest earned</div>
      <div class="num green" id="mInterest">$40,995</div>
    </div>
    <div class="metric">
      <div class="lbl">Final balance</div>
      <div class="num" id="mFinal">$98,995</div>
    </div>
  </div>

  <div class="legend">
    <span><i style="background:#3266ad;"></i>Total balance</span>
    <span><i style="background:#1D9E75;"></i>Interest earned</span>
    <span><i style="background:#b5d4f4; border: 1px solid #3266ad;"></i>Amount invested</span>
  </div>
  <div style="position: relative; width: 100%; height: 280px;">
    <canvas id="ciChart"></canvas>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
  const fmt = (n) => '$' + Math.round(n).toLocaleString();

  function calcData(principal, rate, monthly, years) {
    const r = rate / 100 / 12;
    const labels = [], balances = [], invested = [], interest = [];
    for (let y = 0; y <= years; y++) {
      const n = y * 12;
      const bal = principal * Math.pow(1 + r, n) + (r > 0 ? monthly * (Math.pow(1 + r, n) - 1) / r : monthly * n);
      const inv = principal + monthly * n;
      labels.push(y === 0 ? 'Now' : 'Yr ' + y);
      balances.push(Math.round(bal));
      invested.push(Math.round(inv));
      interest.push(Math.round(bal - inv));
    }
    return { labels, balances, invested, interest };
  }

  const ctx = document.getElementById('ciChart');
  let chart = null;

  function update() {
    const principal = +document.getElementById('principal').value;
    const rate      = +document.getElementById('rate').value;
    const monthly   = +document.getElementById('monthly').value;
    const years     = +document.getElementById('years').value;

    document.getElementById('pVal').textContent = fmt(principal);
    document.getElementById('rVal').textContent = rate + '%';
    document.getElementById('mVal').textContent = fmt(monthly);
    document.getElementById('yVal').textContent = years + ' yrs';

    const d = calcData(principal, rate, monthly, years);
    const finalBal      = d.balances[d.balances.length - 1];
    const totalInvested = d.invested[d.invested.length - 1];
    const totalInterest = finalBal - totalInvested;

    document.getElementById('mInvested').textContent = fmt(totalInvested);
    document.getElementById('mInterest').textContent = fmt(totalInterest);
    document.getElementById('mFinal').textContent    = fmt(finalBal);

    const skipEvery = years > 20 ? 4 : years > 10 ? 2 : 1;

    if (chart) {
      chart.data.labels = d.labels;
      chart.data.datasets[0].data = d.balances;
      chart.data.datasets[1].data = d.interest;
      chart.data.datasets[2].data = d.invested;
      chart.options.scales.x.ticks.callback = function(val, i) {
        return i % skipEvery === 0 || i === d.labels.length - 1 ? d.labels[i] : '';
      };
      chart.update('none');
    } else {
      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: d.labels,
          datasets: [
            {
              label: 'Total balance',
              data: d.balances,
              borderColor: '#3266ad',
              backgroundColor: 'rgba(50,102,173,0.07)',
              fill: true, tension: 0.4, pointRadius: 0, borderWidth: 2
            },
            {
              label: 'Interest',
              data: d.interest,
              borderColor: '#1D9E75',
              backgroundColor: 'rgba(29,158,117,0.08)',
              fill: true, tension: 0.4, pointRadius: 0, borderWidth: 1.5,
              borderDash: [4, 3]
            },
            {
              label: 'Invested',
              data: d.invested,
              borderColor: '#b5d4f4',
              backgroundColor: 'rgba(181,212,244,0.15)',
              fill: true, tension: 0, pointRadius: 0, borderWidth: 1.5
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => ' ' + ctx.dataset.label + ': ' + fmt(ctx.parsed.y)
              }
            }
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: {
                font: { size: 11 },
                color: '#888',
                autoSkip: false,
                maxRotation: 0,
                callback: function(val, i) {
                  return i % skipEvery === 0 || i === d.labels.length - 1 ? d.labels[i] : '';
                }
              }
            },
            y: {
              grid: { color: 'rgba(0,0,0,0.06)' },
              ticks: {
                font: { size: 11 },
                color: '#888',
                callback: v => v >= 1000000 ? '$' + (v/1000000).toFixed(1) + 'M'
                             : v >= 1000    ? '$' + (v/1000).toFixed(0) + 'k'
                             : '$' + v
              }
            }
          }
        }
      });
    }
  }

  ['principal','rate','monthly','years'].forEach(id => {
    document.getElementById(id).addEventListener('input', update);
  });
  update();
</script>
</body>
</html>
